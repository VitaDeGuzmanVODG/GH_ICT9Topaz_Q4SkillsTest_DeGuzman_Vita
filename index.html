<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Q4 Seatwork 1</title>
</head>
<body>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content:center;
            align-items: center;
            background:linear-gradient(to right, #0a1f44, #132b5e);
        }

        .login-box{
            width: 400px;
            background: #f5f0e6;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 25);
        }
        .login-box h1{
            text-align: center;
            color:#0a1f44;;
            margin-bottom: 30px;
            font-size:42px;
        }

        .input-group{
            margin-bottom: 20px;
        }

        .input-group label{
            display: block;
            margin-bottom: 8px;
            color:#0a1f44;
            font-weight:bold;
        }

        .input-group input{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: white;
            font-size: 16px;
        }

        .remember{
            margin: 15px 0;
            color:#0a1f44
        }

        .buttons{
            display:flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .buttons button{
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-btn{
            background: #0a1f44;
            color: #f5f0e6;
        }

        .cancel-btn{
            background: #d8cbb5;
            color: #0a1f44;
        }

        a{
            display:block;
            text-align: center;
            color: #0a1f44;
            margin-top: 25px;
            text-decoration: none;
        }

        a:hover{
            text-decoration: underline;
        }
    </style>
</body>

<div class="login-box">
    <h1>Login</h1>

  <input type="text" id="username" placeholder="Enter username">
<input type="password" id="password" placeholder="Enter password">

<button class="login-btn" id="login-btn">Login</button>
   <a href="#">Forgot username / password?</a>
</body>
<script src="main.js"></script>
</html>
